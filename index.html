<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heimdall | OSINT Framework</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bg-base: #0a0a0c;
            --bg-surface: #141417;
            --accent: #6366f1;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        /* Auth Lock Screen Styles */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-base);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .google-btn {
            background: white;
            color: black;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 2rem auto 0;
            transition: all 0.2s;
        }

        .google-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }

        /* Main App Styles */
        .mono { font-family: 'JetBrains Mono', monospace; }
        .h-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 16px; transition: border 0.3s ease; }
        .h-card:hover { border-color: rgba(99, 102, 241, 0.3); }
        .nav-link { transition: all 0.2s; color: var(--text-secondary); }
        .nav-link.active { color: var(--accent); background: rgba(99, 102, 241, 0.1); }
        input, textarea, select { background: rgba(0, 0, 0, 0.3) !important; border: 1px solid var(--border) !important; color: var(--text-primary) !important; border-radius: 12px !important; outline: none !important; }
        .panel-content { display: none; animation: fadeIn 0.2s ease-out; }
        .panel-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-action { background: var(--accent); color: white; font-weight: 700; transition: all 0.2s; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2); }
        .btn-secondary { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); transition: all 0.2s; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row">

    <!-- Auth Lock Screen -->
    <div id="auth-overlay">
        <div class="login-card">
            <div class="mb-6">
                <div class="w-16 h-16 bg-indigo-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-shield-halved text-2xl text-white"></i>
                </div>
                <h2 class="text-2xl font-extrabold tracking-tighter">HEIMDALL GATE</h2>
                <p class="text-slate-500 text-xs mt-2 uppercase tracking-[0.2em]">Authorized Access Only</p>
            </div>
            <p id="auth-error" class="text-red-400 text-[10px] font-bold uppercase hidden">Access Denied: Email not on whitelist</p>
            <button onclick="signIn()" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- Main Content (Hidden until Auth) -->
    <aside class="sidebar w-64 bg-[#0d0d0f] border-r border-[#1a1a1e] flex flex-col hidden" id="main-sidebar">
        <div class="p-8">
            <h1 class="text-xl font-extrabold tracking-tighter text-indigo-500">HEIMDALL</h1>
            <div id="user-info" class="text-[9px] text-slate-500 mt-2 truncate"></div>
        </div>
        <nav id="sidebar-nav" class="flex-1 px-4 space-y-1"></nav>
        <div class="p-6">
            <button onclick="signOut()" class="w-full py-2 text-[10px] font-bold text-slate-500 hover:text-white transition-colors">LOGOUT SESSION</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative hidden" id="main-app">
        <header class="flex h-14 border-b border-[#1a1a1e] items-center justify-between px-10 bg-[#0a0a0c]/80 backdrop-blur-xl">
            <div id="panel-title" class="text-[10px] font-extrabold uppercase tracking-[0.25em] text-slate-500">Search</div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-[9px] font-bold text-slate-500 uppercase">Secure Link Active</span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-10">
            <div class="max-w-4xl mx-auto w-full space-y-8">
                <!-- SEARCH PANEL -->
                <div id="panel-general" class="panel-content active space-y-6">
                    <div class="h-card p-6 space-y-4">
                        <h2 class="text-sm font-bold uppercase">Multi-Source Discovery</h2>
                        <input type="text" id="global-input" placeholder="Entity name or alias..." class="w-full px-4 py-3">
                        <button onclick="runSpectrumSearch()" class="btn-action w-full py-3 rounded-xl text-xs uppercase">Initialize Global Scan</button>
                    </div>
                </div>
                
                <!-- DORKING PANEL -->
                <div id="panel-dorks" class="panel-content space-y-6">
                    <div class="h-card p-6 space-y-4">
                        <h2 class="text-sm font-bold uppercase">Advanced Dork Constructor</h2>
                        <textarea id="dork-query" class="w-full h-24 p-4 mono text-xs" placeholder="Query Buffer..."></textarea>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="runDork('google')" class="btn-action py-3 rounded-xl text-[10px] uppercase">Google Scan</button>
                            <button onclick="runDork('shodan')" class="btn-secondary py-3 rounded-xl text-[10px] uppercase">Shodan Pivot</button>
                        </div>
                    </div>
                </div>
                <!-- Other panels (Email, Geo, Network, Workspace) would follow same structure -->
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const ADMIN_EMAILS = [
            'your-email@gmail.com',
            'partner-email@gmail.com'
        ];

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        // --- AUTH LOGIC ---
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        auth.onAuthStateChanged(user => {
            if (user) {
                if (ADMIN_EMAILS.includes(user.email)) {
                    showApp(user);
                } else {
                    document.getElementById('auth-error').classList.remove('hidden');
                    auth.signOut();
                }
            } else {
                hideApp();
            }
        });

        function signIn() {
            auth.signInWithPopup(provider).catch(err => alert(err.message));
        }

        function signOut() {
            auth.signOut().then(() => window.location.reload());
        }

        function showApp(user) {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('main-sidebar').classList.remove('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-info').innerText = `OPERATOR: ${user.email}`;
            initNav();
        }

        function hideApp() {
            document.getElementById('auth-overlay').classList.remove('hidden');
        }

        // --- APP LOGIC ---
        const NAV_ITEMS = [
            { id: 'general', label: 'Search', icon: 'fa-search' },
            { id: 'dorks', label: 'Dorks', icon: 'fa-terminal' }
        ];

        function initNav() {
            const side = document.getElementById('sidebar-nav');
            side.innerHTML = '';
            NAV_ITEMS.forEach(item => {
                const btn = document.createElement('button');
                btn.className = `nav-link w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 text-xs font-semibold mb-1`;
                btn.innerHTML = `<i class="fas ${item.icon} w-5 opacity-70"></i> ${item.label}`;
                btn.onclick = () => showPanel(item.id);
                side.appendChild(btn);
            });
        }

        function showPanel(id) {
            document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel-${id}`).classList.add('active');
            document.getElementById('panel-title').innerText = id.toUpperCase();
        }

        function runSpectrumSearch() {
            const val = document.getElementById('global-input').value;
            if(!val) return;
            window.open(`https://www.google.com/search?q=${encodeURIComponent(val)}`, '_blank');
        }

        function runDork(engine) {
            const q = document.getElementById('dork-query').value;
            if(!q) return;
            const url = engine === 'google' ? `https://google.com/search?q=${q}` : `https://shodan.io/search?query=${q}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
