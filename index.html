<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heimdall | OSINT Framework</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bg-base: #0a0a0c;
            --bg-surface: #141417;
            --accent: #6366f1;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            overscroll-behavior-y: contain;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .h-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .main-content { padding-bottom: 80px; }
        }
        @media (min-width: 769px) {
            .sidebar { display: flex; }
            .mobile-nav { display: none; }
        }

        .nav-link {
            transition: all 0.2s;
            color: var(--text-secondary);
        }
        .nav-link.active {
            color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        input, textarea, select {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid var(--border) !important;
            color: var(--text-primary) !important;
            border-radius: 12px !important;
            font-size: 14px !important;
        }

        .panel-content {
            display: none;
            animation: fadeIn 0.2s ease-out;
        }
        .panel-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-action {
            background: var(--accent);
            color: white;
            font-weight: 700;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
        }
        .btn-action:active { transform: scale(0.95); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- Desktop Sidebar -->
    <aside class="sidebar w-64 bg-[#0d0d0f] border-r border-[#1a1a1e] flex-col">
        <div class="p-8">
            <h1 class="text-xl font-extrabold tracking-tighter flex items-center gap-2 text-indigo-500">
                HEIMDALL
            </h1>
            <div class="text-[9px] font-bold text-slate-600 tracking-[0.3em] uppercase mt-1">Intelligence Framework</div>
        </div>
        <nav id="sidebar-nav" class="flex-1 px-4 space-y-1 overflow-y-auto">
            <!-- Nav generated by JS -->
        </nav>
        <div class="p-6">
            <div class="bg-indigo-500/5 border border-indigo-500/10 rounded-xl p-4">
                <div id="current-time-desktop" class="mono text-[10px] text-slate-500 text-center"></div>
            </div>
        </div>
    </aside>

    <!-- Mobile Top Header -->
    <header class="md:hidden h-14 bg-[#0d0d0f] border-b border-[#1a1a1e] flex items-center justify-between px-4 z-20">
        <span class="text-indigo-500 font-extrabold tracking-tighter">HEIMDALL</span>
        <button onclick="clearAllData()" class="text-slate-500"><i class="fas fa-trash-alt text-sm"></i></button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="hidden md:flex h-14 border-b border-[#1a1a1e] items-center justify-between px-10 bg-[#0a0a0c]/80 backdrop-blur-xl z-10">
            <div id="panel-title" class="text-[10px] font-extrabold uppercase tracking-[0.25em] text-slate-500">Search</div>
            <button onclick="clearAllData()" class="text-slate-600 hover:text-red-400 text-xs">RESET CASE</button>
        </header>

        <div id="main-scroll" class="flex-1 overflow-y-auto p-4 md:p-10">
            <div class="max-w-4xl mx-auto w-full space-y-8">
                
                <!-- SEARCH PANEL -->
                <div id="panel-general" class="panel-content space-y-6">
                    <div class="h-card p-6 space-y-4">
                        <h2 class="text-sm font-bold uppercase tracking-wider">Deep Spectrum Search</h2>
                        <div class="flex flex-col gap-3">
                            <input type="text" id="global-input" placeholder="Name, Alias, or EU Entity..." class="w-full px-4 py-3">
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                                <button onclick="runSpectrumSearch()" class="btn-action py-3 rounded-xl text-xs uppercase col-span-full">Execute Global Scan</button>
                                <button onclick="openTarget('https://www.qwant.com/?q=', 'global-input')" class="btn-secondary py-2 rounded-lg text-[10px] font-bold">QWANT</button>
                                <button onclick="openTarget('https://www.mojeek.com/search?q=', 'global-input')" class="btn-secondary py-2 rounded-lg text-[10px] font-bold">MOJEEK</button>
                                <button onclick="openTarget('https://duckduckgo.com/?q=', 'global-input')" class="btn-secondary py-2 rounded-lg text-[10px] font-bold">DDG</button>
                                <button onclick="openTarget('https://yandex.com/search/?text=', 'global-input')" class="btn-secondary py-2 rounded-lg text-[10px] font-bold">YANDEX</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- EMAIL PANEL -->
                <div id="panel-email" class="panel-content space-y-6">
                    <div class="h-card p-6 space-y-4">
                        <h2 class="text-sm font-bold uppercase tracking-wider">Email Intelligence</h2>
                        <div class="flex flex-col gap-3">
                            <input type="text" id="email-input" placeholder="target@domain.com" class="w-full px-4 py-3">
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                                <button onclick="openEmail('hunter')" class="btn-secondary py-2 rounded-lg text-[10px] font-bold">HUNTER.IO</button>
                                <button onclick="openEmail('eon')" class="btn-secondary py-2 rounded-lg text-[10px] font-bold">EPIOS (EON)</button>
                                <button onclick="openEmail('hole')" class="btn-secondary py-2 rounded-lg text-[10px] font-bold">EMAILHIPPO</button>
                                <button onclick="openEmail('pwned')" class="btn-secondary py-2 rounded-lg text-[10px] font-bold">HIBP</button>
                            </div>
                            <button onclick="runEmailDiscovery()" class="btn-action py-3 rounded-xl text-xs uppercase">Run Breach & Leak Scan</button>
                        </div>
                    </div>
                </div>

                <!-- DORKING PANEL -->
                <div id="panel-dorks" class="panel-content space-y-6">
                    <div class="h-card p-6 space-y-6">
                        <h2 class="text-sm font-bold uppercase tracking-wider">Dork Constructor</h2>
                        <div class="space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="space-y-2">
                                    <label class="text-[10px] font-bold text-slate-500 uppercase">Operator</label>
                                    <select id="dork-operator" class="w-full px-4 py-2">
                                        <option value="site:">site: (Specific domain)</option>
                                        <option value="filetype:">filetype: (pdf, xls, doc)</option>
                                        <option value="intext:">intext: (Text in body)</option>
                                        <option value="intitle:">intitle: (Page title)</option>
                                        <option value="inurl:">inurl: (String in URL)</option>
                                        <option value="cache:">cache: (Google cache)</option>
                                        <option value='ext:'>ext: (Extension)</option>
                                    </select>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] font-bold text-slate-500 uppercase">Value / Argument</label>
                                    <input type="text" id="dork-value" placeholder="e.g. gov.uk or 'confidential'" class="w-full px-4 py-2">
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="addDorkPart()" class="flex-1 btn-secondary py-2 rounded-lg text-xs uppercase font-bold text-indigo-400">Append Operator</button>
                                <button onclick="clearDork()" class="px-4 btn-secondary rounded-lg"><i class="fas fa-undo"></i></button>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-slate-500 uppercase">Final Query</label>
                                <textarea id="dork-query" class="w-full h-24 p-4 mono text-xs" placeholder="Select operators above or type manually..."></textarea>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                                <button onclick="runDork('google')" class="btn-action py-3 rounded-xl text-[10px] uppercase">Google</button>
                                <button onclick="runDork('bing')" class="btn-secondary py-3 rounded-xl text-[10px] uppercase">Bing</button>
                                <button onclick="runDork('yandex')" class="btn-secondary py-3 rounded-xl text-[10px] uppercase">Yandex</button>
                                <button onclick="runDork('duck')" class="btn-secondary py-3 rounded-xl text-[10px] uppercase">DDG</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- GEO PANEL -->
                <div id="panel-geo" class="panel-content space-y-6">
                    <div class="h-card p-6 space-y-4">
                        <h2 class="text-sm font-bold uppercase tracking-wider">Geospatial Intelligence</h2>
                        <input type="text" id="geo-input" placeholder="City, Postcode, or Coords" class="w-full px-4 py-3">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                            <button onclick="openGeo('geoportail')" class="btn-secondary py-3 rounded-xl text-[10px] uppercase font-bold">GEOPORTAIL (FR)</button>
                            <button onclick="openGeo('atlas_be')" class="btn-secondary py-3 rounded-xl text-[10px] uppercase font-bold">ATLAS (BE)</button>
                            <button onclick="openGeo('osm')" class="btn-secondary py-3 rounded-xl text-[10px] uppercase font-bold">OSM</button>
                            <button onclick="openGeo('sentinel')" class="btn-secondary py-3 rounded-xl text-[10px] uppercase font-bold">SENTINEL HUB</button>
                        </div>
                    </div>
                </div>

                <!-- NETWORK PANEL -->
                <div id="panel-network" class="panel-content space-y-6">
                    <div class="h-card p-6">
                        <h2 class="text-sm font-bold uppercase mb-4 tracking-wider">Infrastructure Analysis</h2>
                        <input type="text" id="network-input" placeholder="domain.eu or IP" class="w-full px-4 py-3 mb-4">
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                            <button onclick="openNet('ripe')" class="btn-secondary p-4 rounded-xl flex flex-col gap-2 text-[10px] items-center">
                                <i class="fas fa-database text-indigo-400 text-lg"></i> RIPE NCC
                            </button>
                            <button onclick="openNet('whois_eu')" class="btn-secondary p-4 rounded-xl flex flex-col gap-2 text-[10px] items-center">
                                <i class="fas fa-flag-eu text-indigo-400 text-lg"></i> EURID WHOIS
                            </button>
                            <button onclick="openNet('shodan')" class="btn-secondary p-4 rounded-xl flex flex-col gap-2 text-[10px] items-center">
                                <i class="fas fa-search text-indigo-400 text-lg"></i> SHODAN
                            </button>
                        </div>
                    </div>
                </div>

                <!-- WORKSPACE -->
                <div id="panel-workspace" class="panel-content space-y-6">
                    <div class="h-card p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-sm font-bold uppercase">Case Journal</h2>
                            <span id="char-count" class="mono text-[10px] text-slate-500">000000</span>
                        </div>
                        <textarea id="case-notes" class="w-full h-64 p-4 text-sm mono" placeholder="Document intel chain..."></textarea>
                    </div>
                    <div class="h-card p-6">
                        <h2 class="text-sm font-bold uppercase mb-4 tracking-wider">Evidence Vault</h2>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="vault-input" placeholder="Paste URL source for preservation..." class="flex-1 px-4 py-2">
                            <button onclick="addVaultLink()" class="btn-action px-6 rounded-xl text-xs font-bold">ADD SOURCE</button>
                        </div>
                        <ul id="link-list" class="space-y-2">
                            <!-- Links render here -->
                        </ul>
                        <button onclick="exportWorkspace()" class="w-full mt-6 btn-action py-3 rounded-xl text-xs uppercase">Export Intel Package</button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Mobile Nav -->
    <nav class="mobile-nav fixed bottom-0 left-0 right-0 h-16 bg-[#0d0d0f] border-t border-[#1a1a1e] flex justify-around items-center px-2 z-50">
        <!-- Generated by JS -->
    </nav>

    <script>
        const NAV_ITEMS = [
            { id: 'general', label: 'Search', icon: 'fa-search' },
            { id: 'email', label: 'Email', icon: 'fa-envelope' },
            { id: 'dorks', label: 'Dorks', icon: 'fa-terminal' },
            { id: 'geo', label: 'Geo', icon: 'fa-map-location-dot' },
            { id: 'network', label: 'Net', icon: 'fa-server' },
            { id: 'workspace', label: 'Case', icon: 'fa-briefcase' }
        ];

        let state = {
            activePanel: 'general',
            links: []
        };

        window.onload = () => {
            initNav();
            updateClock();
            setInterval(updateClock, 1000);
            
            const savedNotes = localStorage.getItem('h_notes');
            if (savedNotes) {
                document.getElementById('case-notes').value = savedNotes;
                updateCharCount(savedNotes.length);
            }
            state.links = JSON.parse(localStorage.getItem('h_links') || '[]');
            renderLinks();

            document.getElementById('case-notes').addEventListener('input', e => {
                localStorage.setItem('h_notes', e.target.value);
                updateCharCount(e.target.value.length);
            });

            showPanel('general');
        };

        function initNav() {
            const side = document.getElementById('sidebar-nav');
            const mobile = document.querySelector('.mobile-nav');
            
            NAV_ITEMS.forEach(item => {
                const sBtn = document.createElement('button');
                sBtn.className = `nav-link w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 text-xs font-semibold mb-1`;
                sBtn.id = `side-${item.id}`;
                sBtn.innerHTML = `<i class="fas ${item.icon} w-5 opacity-70"></i> ${item.label}`;
                sBtn.onclick = () => showPanel(item.id);
                side.appendChild(sBtn);

                const mBtn = document.createElement('button');
                mBtn.className = `nav-link flex flex-col items-center gap-1 flex-1`;
                mBtn.id = `mobile-${item.id}`;
                mBtn.innerHTML = `<i class="fas ${item.icon} text-lg"></i><span class="text-[8px] uppercase font-bold">${item.label}</span>`;
                mBtn.onclick = () => showPanel(item.id);
                mobile.appendChild(mBtn);
            });
        }

        function showPanel(id) {
            document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            document.getElementById(`panel-${id}`).classList.add('active');
            const sBtn = document.getElementById(`side-${id}`);
            const mBtn = document.getElementById(`mobile-${id}`);
            if(sBtn) sBtn.classList.add('active');
            if(mBtn) mBtn.classList.add('active');
            
            document.getElementById('panel-title').innerText = id.toUpperCase();
            state.activePanel = id;
        }

        function notify(msg, err = false) {
            const t = document.createElement('div');
            t.className = `fixed top-20 left-1/2 -translate-x-1/2 px-6 py-2 rounded-full shadow-2xl text-[10px] font-bold uppercase tracking-widest z-[100] transform bg-indigo-600 text-white`;
            if(err) t.classList.replace('bg-indigo-600', 'bg-red-500');
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function openTarget(url, inputId) {
            const val = document.getElementById(inputId).value.trim();
            if (!val) return notify('Input required', true);
            window.open(url + encodeURIComponent(val), '_blank');
        }

        function runSpectrumSearch() {
            const val = document.getElementById('global-input').value.trim();
            if (!val) return notify('Input required', true);
            const urls = [
                `https://www.google.com/search?q=${encodeURIComponent(val)}&gl=be`,
                `https://www.qwant.com/?q=${encodeURIComponent(val)}`,
                `https://www.mojeek.com/search?q=${encodeURIComponent(val)}`,
                `https://yandex.com/search/?text=${encodeURIComponent(val)}`
            ];
            urls.forEach(u => window.open(u, '_blank'));
        }

        function openEmail(type) {
            const val = document.getElementById('email-input').value.trim();
            if(!val) return notify('Email required', true);
            const map = {
                hunter: `https://hunter.io/email-verifier/${val}`,
                eon: `https://epieos.com/?q=${val}`,
                hole: `https://www.emailhippo.com/`,
                pwned: `https://haveibeenpwned.com/account/${val}`
            };
            window.open(map[type], '_blank');
        }

        function runEmailDiscovery() {
            const val = document.getElementById('email-input').value.trim();
            if(!val) return notify('Email required', true);
            window.open(`https://intelx.io/?s=${val}`, '_blank');
            window.open(`https://dehashed.com/search?query=${val}`, '_blank');
            window.open(`https://www.google.com/search?q=\"${val}\"`, '_blank');
        }

        function addDorkPart() {
            const op = document.getElementById('dork-operator').value;
            const val = document.getElementById('dork-value').value.trim();
            if(!val) return notify('Operator value required', true);
            const d = document.getElementById('dork-query');
            d.value += (d.value ? ' ' : '') + op + val;
            document.getElementById('dork-value').value = '';
        }

        function clearDork() { document.getElementById('dork-query').value = ''; }

        function runDork(engine) {
            const q = document.getElementById('dork-query').value.trim();
            if(!q) return notify('No query built', true);
            const urls = {
                google: `https://www.google.com/search?q=${encodeURIComponent(q)}&gl=be`,
                bing: `https://www.bing.com/search?q=${encodeURIComponent(q)}`,
                yandex: `https://yandex.com/search/?text=${encodeURIComponent(q)}`,
                duck: `https://duckduckgo.com/?q=${encodeURIComponent(q)}`
            };
            window.open(urls[engine], '_blank');
        }

        function openGeo(type) {
            const val = document.getElementById('geo-input').value.trim();
            if(!val) return notify('Location required', true);
            const map = {
                geoportail: `https://www.geoportail.gouv.fr/carte?q=${val}`,
                atlas_be: `https://www.topomapviewer.be/`,
                osm: `https://www.openstreetmap.org/search?query=${val}`,
                sentinel: `https://apps.sentinel-hub.com/eo-browser/`
            };
            window.open(map[type], '_blank');
        }

        function openNet(type) {
            const val = document.getElementById('network-input').value.trim();
            if(!val) return notify('Target required', true);
            const map = {
                ripe: `https://apps.db.ripe.net/db-web-ui/query?searchtext=${val}`,
                whois_eu: `https://whois.eurid.eu/en/?domain=${val}`,
                shodan: `https://www.shodan.io/search?query=${val}`
            };
            window.open(map[type], '_blank');
        }

        // Vault Logic
        function addVaultLink() {
            const input = document.getElementById('vault-input');
            const url = input.value.trim();
            if (!url) return notify('No URL to add', true);
            
            state.links.unshift({ url: url, ts: new Date().toISOString() });
            input.value = '';
            saveLinks();
            renderLinks();
            notify('Evidence added to vault');
        }

        function removeVaultLink(idx) {
            state.links.splice(idx, 1);
            saveLinks();
            renderLinks();
        }

        function renderLinks() {
            const l = document.getElementById('link-list');
            if (state.links.length === 0) {
                l.innerHTML = `<li class="text-[10px] text-slate-600 text-center py-4 uppercase tracking-tighter">No sources preserved in vault</li>`;
                return;
            }
            l.innerHTML = state.links.map((link, idx) => `
                <li class="bg-[#1a1a1e] p-3 rounded-xl border border-white/5 flex justify-between items-center group">
                    <div class="truncate flex-1">
                        <a href="${link.url}" target="_blank" class="text-[10px] mono text-indigo-400 underline decoration-indigo-500/30 truncate block">${link.url}</a>
                        <div class="text-[8px] text-slate-600 mono mt-1">${link.ts}</div>
                    </div>
                    <button onclick="removeVaultLink(${idx})" class="text-slate-600 hover:text-red-400 px-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fas fa-trash-alt text-[10px]"></i>
                    </button>
                </li>
            `).join('');
        }

        function saveLinks() { localStorage.setItem('h_links', JSON.stringify(state.links)); }
        function updateCharCount(l) { document.getElementById('char-count').innerText = l.toString().padStart(6, '0'); }
        function updateClock() {
            const el = document.getElementById('current-time-desktop');
            if(el) el.innerText = new Date().toISOString().slice(0, 19).replace('T', ' ');
        }

        function clearAllData() {
            if (confirm('WIPE ALL CASE INTELLIGENCE?')) {
                localStorage.clear();
                location.reload();
            }
        }

        function exportWorkspace() {
            const n = document.getElementById('case-notes').value;
            const l = state.links.map(x => `[${x.ts}] ${x.url}`).join('\n');
            const content = `HEIMDALL INTELLIGENCE PACKAGE\n============================\nTIMESTAMP: ${new Date().toISOString()}\n\nANALYSIS LOG:\n${n}\n\nPRESERVED SOURCES:\n${l}`;
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `HEIMDALL_INTEL_${Date.now()}.txt`;
            a.click();
        }
    </script>
</body>
</html>
